<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%app-icon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="MachineFit - AI-powered machine settings tailored to your body" />
    <meta name="theme-color" content="#111827" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>MachineFit</title>
    <script>
      (function () {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (reg) { reg.unregister(); });
            });
          }
          if (window.caches) {
            caches.keys().then(function (keys) {
              keys.forEach(function (key) { caches.delete(key); });
            });
          }
        } catch (e) {}
        try {
          var ua = navigator.userAgent || '';
          var uaPlatform =
            navigator.userAgentData && navigator.userAgentData.platform
              ? navigator.userAgentData.platform
              : '';
          var isIos =
            /iPhone|iPad|iPod/i.test(ua) ||
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) ||
            /iOS|iPhone|iPad/i.test(uaPlatform);
          var platform = isIos
            ? 'ios'
            : /Android/i.test(ua) ||
                /Android/i.test(uaPlatform) ||
                (navigator.userAgentData && navigator.userAgentData.mobile)
              ? 'android'
              : 'other';
          document.documentElement.setAttribute('data-platform', platform);
        } catch (e) {}
        try {
          var raw = localStorage.getItem('machinefit-settings');
          if (!raw) return;
          var parsed = JSON.parse(raw);
          var theme = parsed && parsed.state && parsed.state.theme;
          if (theme) document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
