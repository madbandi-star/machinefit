<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%app-icon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="MachineFit - AI-powered machine settings tailored to your body" />
    <meta name="theme-color" content="#111827" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>MachineFit</title>
    <style id="mf-app-frame-v13">
      /* iPhone 15 Pro Max frame — critical before CSS bundle loads */
      :root {
        --app-frame-width: 430px;
      }
      #root {
        width: 100%;
        max-width: 430px;
        margin-inline: auto;
      }
      .recommendation-settings-panel--result .recommendation-settings-panel__grid--dense {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }
    </style>
    <script>
      (function () {
        /* Mobile: lock layout viewport to iPhone 15 Pro Max CSS width so media queries + flex match */
        try {
          var ua = navigator.userAgent || '';
          var isMobile =
            /Android|iPhone|iPad|iPod/i.test(ua) ||
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
          if (isMobile) {
            var vp = document.querySelector('meta[name="viewport"]');
            if (vp) {
              vp.setAttribute('content', 'width=430, initial-scale=1, viewport-fit=cover');
            }
          }
        } catch (e) {}
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (reg) { reg.unregister(); });
            });
          }
          if (window.caches) {
            caches.keys().then(function (keys) {
              keys.forEach(function (key) { caches.delete(key); });
            });
          }
        } catch (e) {}
        try {
          var raw = localStorage.getItem('machinefit-settings');
          if (!raw) return;
          var parsed = JSON.parse(raw);
          var theme = parsed && parsed.state && parsed.state.theme;
          if (theme) document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
