<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%app-icon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="MachineFit - Optimal strength machine settings for your body" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>MachineFit</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('machinefit-settings');
          if (!raw) return;
          var parsed = JSON.parse(raw);
          var theme = parsed && parsed.state && parsed.state.theme;
          if (theme) document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
