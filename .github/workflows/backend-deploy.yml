name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'database/**'
      - 'package.json'
      - 'package-lock.json'
      - 'render.yaml'
  workflow_dispatch:

concurrency:
  group: render-backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set."
            echo "Render -> machinefit-api -> Settings -> Deploy Hook -> copy URL"
            echo "GitHub -> Settings -> Secrets -> Actions -> add RENDER_DEPLOY_HOOK_URL"
            exit 1
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"
          echo "Render deploy triggered successfully."
