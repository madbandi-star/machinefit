<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MachineFit 이메일 테스트</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 48px auto; padding: 0 16px; }
    .ok { color: #0a7; }
    .err { color: #c00; }
  </style>
</head>
<body>
  <h1>MachineFit 이메일 테스트</h1>
  <p id="status">FormSubmit으로 madbandi@gmail.com 에 테스트 메일을 보내는 중…</p>
  <p><small>FormSubmit 최초 사용 시 madbandi@gmail.com 으로 <strong>활성화 메일</strong>이 먼저 옵니다. 링크를 눌러야 이후 메일이 도착합니다.</small></p>

  <script>
    const status = document.getElementById('status');
    const now = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });

    fetch('https://formsubmit.co/ajax/madbandi@gmail.com', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Accept: 'application/json',
      },
      body: JSON.stringify({
        _subject: '[MachineFit] 브라우저 테스트 이메일',
        _template: 'table',
        _captcha: 'false',
        message: '브라우저(FormSubmit) 테스트입니다.\n\n발송 시각: ' + now,
        email: 'machinefit@noreply.local',
        name: 'MachineFit',
      }),
    })
      .then((r) => r.json())
      .then((data) => {
        if (data.success === 'true' || data.success === true) {
          status.innerHTML = '<span class="ok">전송 요청 완료.</span> madbandi@gmail.com 받은편지함·스팸함을 확인하세요.';
        } else {
          status.innerHTML = '<span class="err">실패:</span> ' + (data.message || JSON.stringify(data));
        }
      })
      .catch((err) => {
        status.innerHTML = '<span class="err">오류:</span> ' + err.message;
      });
  </script>
</body>
</html>
